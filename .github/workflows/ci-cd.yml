name: 🐶 CI/CD - Tienda Perritos

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # =========================
  # 🧪 1. TESTS
  # =========================
  test:
    name: Pruebas Unitarias
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: |
          cd backend
          npm install

      - name: Ejecutar tests con cobertura
        run: |
          cd backend
          npm test

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/

  # =========================
  # 🐳 2. BUILD + PUSH A ECR
  # =========================
  build:
    name: Build & Push a ECR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push imagen backend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/tienda-perritos-backend:${{ github.sha }} -t $REGISTRY/tienda-perritos-backend:latest ./backend
          docker push $REGISTRY/tienda-perritos-backend:${{ github.sha }}
          docker push $REGISTRY/tienda-perritos-backend:latest

      - name: Build & push imagen frontend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/tienda-perritos-frontend:${{ github.sha }} -t $REGISTRY/tienda-perritos-frontend:latest ./frontend
          docker push $REGISTRY/tienda-perritos-frontend:${{ github.sha }}
          docker push $REGISTRY/tienda-perritos-frontend:latest

      - name: Build & push imagen db
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/tienda-perritos-db:${{ github.sha }} -t $REGISTRY/tienda-perritos-db:latest ./db
          docker push $REGISTRY/tienda-perritos-db:${{ github.sha }}
          docker push $REGISTRY/tienda-perritos-db:latest

      - name: 🔒 Verificar vulnerabilidades críticas (ECR scan)
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Esperando resultado del escaneo de vulnerabilidades..."
          aws ecr wait image-scan-complete --repository-name tienda-perritos-backend --image-id imageTag=${{ github.sha }} --region ${{ secrets.AWS_REGION }}

          CRITICAL_COUNT=$(aws ecr describe-image-scan-findings \
            --repository-name tienda-perritos-backend \
            --image-id imageTag=${{ github.sha }} \
            --region ${{ secrets.AWS_REGION }} \
            --query "imageScanFindings.findingSeverityCounts.CRITICAL" \
            --output text)

          echo "Vulnerabilidades CRITICAL encontradas: ${CRITICAL_COUNT}"

          if [ "$CRITICAL_COUNT" != "None" ] && [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "❌ Se encontraron $CRITICAL_COUNT vulnerabilidades CRÍTICAS. Deteniendo el pipeline."
            exit 1
          else
            echo "✅ Sin vulnerabilidades críticas."
          fi

  # =========================
  # 🚀 3. DEPLOY A AMAZON EKS
  # =========================
  deploy:
    name: Deploy a EKS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configurar kubectl (kubeconfig)
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Aplicar manifiestos de Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/mysql-service.yaml
          kubectl apply -f k8s/mysql-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/backend-hpa.yaml
          kubectl apply -f k8s/frontend-hpa.yaml

      - name: Actualizar imágenes al SHA del commit actual
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          kubectl set image deployment/backend backend=$REGISTRY/tienda-perritos-backend:${{ github.sha }} -n tienda
          kubectl set image deployment/frontend frontend=$REGISTRY/tienda-perritos-frontend:${{ github.sha }} -n tienda
          kubectl set image deployment/mysql mysql=$REGISTRY/tienda-perritos-db:${{ github.sha }} -n tienda

      - name: Esperar a que el despliegue se estabilice
        run: |
          kubectl rollout status deployment/backend -n tienda --timeout=180s
          kubectl rollout status deployment/frontend -n tienda --timeout=180s
          kubectl rollout status deployment/mysql -n tienda --timeout=180s

      - name: Confirmar despliegue exitoso
        run: |
          kubectl get pods -n tienda
          kubectl get svc frontend -n tienda
          echo "✅ Despliegue a Amazon EKS completado correctamente."